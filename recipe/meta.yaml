{% set name = "testscenarios" %}
{% set version = "0.6.2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/testing-cabal/{{ name }}/archive/refs/tags/{{ version }}.tar.gz
  sha256: d329d0b2067b9d9e1a565893d7d930faee76eba543e6c28cacaf946ba52141c7

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true # [py<310]

requirements:
  host:
    - python
    - pip
    - hatchling
    - hatch-vcs
  run:
    - pbr
    - python
    - testtools >=2.8.7

test:
  source_files:
    - tests
    - README.rst
    - pyproject.toml
  imports:
    - testscenarios
    - testscenarios.scenarios
    - testscenarios.testcase
  requires:
    - pip
    - pytest
    - testtools >=2.8.7
  commands:
    - pip check
    - python -m pytest tests/ -k "not TestTestWithScenarios"

about:
  home: https://github.com/testing-cabal/testscenarios
  license: BSD-3-Clause
  license_family: BSD
  license_file: 
    - Apache-2.0
    - BSD
  summary: Testscenarios, a pyunit extension for dependency injection
  description: |
    testscenarios provides clean dependency injection for python unittest
    style tests. This can be used for interface testing (testing many
    implementations via a single test suite) or for classic dependency
    injection (provide tests with dependencies externally to the test code
    itself, allowing easy testing in different situations).
  doc_url: https://github.com/testing-cabal/testscenarios
  dev_url: https://github.com/testing-cabal/testscenarios

extra:
  recipe-maintainers: 
    - vkhomits
